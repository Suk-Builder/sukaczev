version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sukaczev
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Sukaczev416520!}
      POSTGRES_DB: sukaczev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sukaczev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: sukaczev
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Sukaczev416520!}
    volumes:
      - rabbitdata:/var/lib/rabbitmq

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  user-service:
    build: ./services/user-service
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgres://sukaczev:${DB_PASSWORD}@postgres:5432/sukaczev
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://sukaczev:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-sukaczev_jwt_secret_change_me_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  video-service:
    build: ./services/video-service
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgres://sukaczev:${DB_PASSWORD}@postgres:5432/sukaczev
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://sukaczev:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  danmaku-service:
    build: ./services/danmaku-service
    ports:
      - "3004:3000"
    environment:
      DATABASE_URL: postgres://sukaczev:${DB_PASSWORD}@postgres:5432/sukaczev
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://sukaczev:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  comment-service:
    build: ./services/comment-service
    ports:
      - "3005:3000"
    environment:
      DATABASE_URL: postgres://sukaczev:${DB_PASSWORD}@postgres:5432/sukaczev
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://sukaczev:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  search-service:
    build: ./services/search-service
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: postgres://sukaczev:${DB_PASSWORD}@postgres:5432/sukaczev
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://sukaczev:${RABBITMQ_PASSWORD}@rabbitmq:5672
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: ${JWT_SECRET:-sukaczev_jwt_secret_change_me_in_production}
    depends_on:
      elasticsearch:
        condition: service_started
      redis:
        condition: service_started

  notification-service:
    build: ./services/notification-service
    ports:
      - "3006:3000"
    environment:
      DATABASE_URL: postgres://sukaczev:${DB_PASSWORD}@postgres:5432/sukaczev
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://sukaczev:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-sukaczev_jwt_secret_change_me_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  rabbitdata:
  esdata:
